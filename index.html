<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCP Automation Chat</title>
  <style>
    :root {
      --bg: #f4f1ea;
      --panel: #fffdf8;
      --ink: #1f1a14;
      --muted: #6f6253;
      --accent: #b34d2e;
      --accent-2: #e8d0b7;
      --user: #1f6f8b;
      --system: #efe2d4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Source Sans 3", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 10%, #fbe5c8 0%, transparent 35%),
        radial-gradient(circle at 90% 90%, #dceef7 0%, transparent 30%),
        var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .chat-shell {
      width: min(920px, 100%);
      height: min(88vh, 900px);
      display: flex;
      flex-direction: column;
      border: 1px solid #e2d8ca;
      border-radius: 18px;
      background: var(--panel);
      box-shadow: 0 20px 50px rgba(31, 26, 20, 0.12);
      overflow: hidden;
    }
    .chat-head {
      padding: 16px 20px;
      border-bottom: 1px solid #eadfce;
      background: linear-gradient(90deg, #fff9f0, #f5ece0);
      font-weight: 700;
    }
    .chat-log {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 85%;
      padding: 12px 14px;
      border-radius: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--user);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.system {
      align-self: flex-start;
      background: var(--system);
      color: var(--ink);
      border-bottom-left-radius: 4px;
    }
    .composer {
      display: flex;
      gap: 10px;
      border-top: 1px solid #eadfce;
      padding: 14px;
      background: #fff;
    }
    .composer input {
      flex: 1;
      border: 1px solid #d9cdbd;
      border-radius: 10px;
      padding: 12px;
      font-size: 16px;
    }
    .composer button {
      border: none;
      background: var(--accent);
      color: #fff;
      padding: 0 18px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
    }
    .status {
      color: var(--muted);
      font-size: 13px;
      padding: 0 16px 12px;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <main class="chat-shell">
    <header class="chat-head">AI Automation Assistant</header>
    <section id="chatLog" class="chat-log"></section>
    <form id="chatForm" class="composer">
      <input id="queryInput" placeholder="Ask to create repos or drive folders..." required />
      <button type="submit">Send</button>
    </form>
    <div id="status" class="status"></div>
  </main>

  <script>
    const chatLog = document.getElementById("chatLog");
    const chatForm = document.getElementById("chatForm");
    const queryInput = document.getElementById("queryInput");
    const statusEl = document.getElementById("status");

    const API_BASE = "https://llm-mcp-demo.onrender.com";

    function appendMessage(text, role) {
      const el = document.createElement("div");
      el.className = `msg ${role}`;
      el.textContent = text;
      chatLog.appendChild(el);
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    chatForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const query = queryInput.value.trim();
      if (!query) return;

      appendMessage(query, "user");
      queryInput.value = "";
      statusEl.textContent = "Running automation...";

      try {
        const res = await fetch(`${API_BASE}/query`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query }),
        });

        const data = await res.json();
        if (!res.ok) {
          appendMessage(data.error || "Request failed", "system");
        } else {
          appendMessage(data.message, "system");
        }
      } catch (err) {
        appendMessage(`Network error: ${err.message}`, "system");
      } finally {
        statusEl.textContent = "";
      }
    });

    appendMessage("Ready. Try: Create drive folder STUDENTS/BALAJI P, ROSHAN P", "system");
  </script>
</body>
</html>
